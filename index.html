<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio Maio - Viver de Renda</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #1A1A1A;
            background-image: linear-gradient(rgba(26, 26, 26, 0.95), rgba(26, 26, 26, 0.95)), url('https://images.unsplash.com/photo-1590283603385-17ffb3a7f29f?auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
    </style>
</head>
<body class="text-white font-sans min-h-screen flex flex-col justify-center items-center p-6 selection:bg-green-500 selection:text-black">

    <main class="max-w-4xl w-full text-center space-y-16 my-auto">
        
        <!-- Grid de Conteúdo -->
        <div class="grid md:grid-cols-2 gap-12 items-stretch mt-8">
            
            <!-- Card 3 -->
            <div class="bg-black/40 backdrop-blur-md p-8 rounded-2xl border border-white/10 flex flex-col items-center text-center transform hover:scale-[1.02] transition-all duration-300">
                <div class="w-20 h-20 bg-green-500/10 border-2 border-green-500 rounded-full flex items-center justify-center text-green-400 text-4xl font-black mb-6 shadow-lg shadow-green-500/20">
                    3
                </div>
                <h2 class="text-xl font-bold text-green-400 mb-3">Renda Passiva Real:</h2>
                <p class="text-gray-300 leading-relaxed text-base">
                    Monte um fluxo previsível de dividendos e proventos focado no longo prazo.
                </p>
            </div>

            <!-- Card 2 -->
            <div class="bg-black/40 backdrop-blur-md p-8 rounded-2xl border border-white/10 flex flex-col items-center text-center transform hover:scale-[1.02] transition-all duration-300">
                <div class="w-20 h-20 bg-green-500/10 border-2 border-green-500 rounded-full flex items-center justify-center text-green-400 text-4xl font-black mb-6 shadow-lg shadow-green-500/20">
                    2
                </div>
                <h2 class="text-xl font-bold text-green-400 mb-3">Blindagem Internacional:</h2>
                <p class="text-gray-300 leading-relaxed text-base">
                    Não coloque todos os seus ovos na mesma cesta. Aprenda a dolarizar parte do seu capital para se proteger de crises locais.
                </p>
            </div>

        </div>

        <!-- Botão de Ação Principal -->
        <div class="pt-4">
            <a href="#" class="inline-flex items-center justify-center gap-3 bg-[#8BCE42] hover:bg-[#77B236] text-black font-black text-lg md:text-xl uppercase tracking-wider px-10 py-5 rounded-xl shadow-xl shadow-green-900/30 hover:shadow-green-500/20 transform hover:-translate-y-1 transition-all duration-300 w-full sm:w-auto">
                <svg class="w-5 h-5 stroke-[3]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15M12 9l-3 3m0 0l3 3m-3-3h12.75" />
                </svg>
                Quero entrar para o Viver de Renda
            </a>
        </div>

    </main>

</body>
</html>
